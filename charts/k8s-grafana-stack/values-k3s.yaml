# k8s-grafana-stack — k3s platform overrides
# Usage: helm install k8s-grafana-stack k8s-grafana-stack/k8s-grafana-stack -f values-k3s.yaml -n monitoring --create-namespace

# Enable Traefik HTTPRoute for Grafana (Gateway API)
traefik:
  enabled: true
  gatewayName: ""        # e.g. "my-gateway"
  gatewayNamespace: ""   # e.g. "default"

# k3s: node-exporter — disable hostNetwork/hostPID to avoid port conflicts
prometheus-node-exporter:
  hostNetwork: false
  hostPID: false

# k3s: Grafana served under /grafana subpath via Traefik
grafana:
  grafana.ini:
    server:
      root_url: "http://<your-domain>/grafana"
      serve_from_sub_path: true