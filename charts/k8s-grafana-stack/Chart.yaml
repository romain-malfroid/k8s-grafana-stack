apiVersion: v2
name: k8s-grafana-stack
description: Complete Grafana observability stack — metrics, logs, traces collected by Alloy
type: application
version: 0.2.2

dependencies:
  # Collection — Alloy handles metrics, logs and traces
  - name: alloy
    version: "1.6.2"
    repository: https://grafana.github.io/helm-charts

  # Exporters scraped by Alloy
  - name: kube-state-metrics
    version: "7.2.1"
    repository: https://prometheus-community.github.io/helm-charts

  - name: prometheus-node-exporter
    version: "4.52.1"
    repository: https://prometheus-community.github.io/helm-charts

  # Metrics storage + alerting
  - name: prometheus
    version: "28.13.0"
    repository: https://prometheus-community.github.io/helm-charts

  - name: alertmanager
    version: "1.33.1"
    repository: https://prometheus-community.github.io/helm-charts

  # Log storage
  - name: loki
    version: "6.55.0"
    repository: https://grafana.github.io/helm-charts

  # Trace storage
  - name: tempo
    version: "1.24.4"
    repository: https://grafana.github.io/helm-charts

  # Visualization
  - name: grafana
    version: "10.5.15"
    repository: https://grafana.github.io/helm-charts