# k8s-grafana-stack — default values
# Works on any Kubernetes distribution (k3s, EKS, GKE, vanilla k8s...)
#
# Quick overrides:
#   Expose Grafana via ingress ............. see grafana: section → ingress
#   k3s fix (node-exporter conflicts) ...... see prometheus-node-exporter: section
#
# Enable / disable components (set enabled: false in the relevant section below):
#   prometheus.enabled: false → metrics off (Prometheus, node-exporter, kube-state-metrics, Alertmanager)
#   loki.enabled: false       → logs off
#   tempo.enabled: false      → traces off

# Name added as "cluster" label on all metrics (used by dashboards)
clusterName: "local"


# ============================================================
# EXTRA ALLOY CONFIG — custom scrape jobs, etc.
# ============================================================

# Extra Alloy config appended to the generated config — for custom scrape jobs, etc.
# See: https://grafana.com/docs/alloy/latest/reference/components/
extraAlloyConfig: ""

# Optional Alloy pipeline stages injected between log collection and Loki write.
# Allows adding stage.regex, stage.labels, stage.json, etc. without creating
# a separate log source (no duplicate logs).
# Example — extract log level from any log format:
#   logsProcessStages: |
#     stage.regex {
#       expression = `(?i)\b(?P<level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL)\b`
#     }
#     stage.labels {
#       values = { level = "level" }
#     }
logsProcessStages: ""

# ============================================================
# COLLECTION — Alloy (metrics + logs + traces)
# ============================================================
alloy:
  alloy:
    configMap:
      create: false
      name: "k8s-grafana-stack-alloy-config" # Must match release name + "-alloy-config"
      key: config.alloy
    controller:
      type: statefulset
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
  serviceAccount:
    create: true
  rbac:
    create: false # Managed by our alloy-rbac.yaml template

# ============================================================
# EXPORTERS — scraped by Alloy
# ============================================================
kube-state-metrics:
  # All metrics exposed — no allow-list filtering
  metricLabelsAllowlist:
    - namespaces=[*]
    - pods=[*]
    - nodes=[*]

prometheus-node-exporter:
  tolerations:
    - operator: Exists
      effect: NoSchedule
  # K3S: uncomment the two lines below to avoid port conflicts with k3s internal processes.
  # Disabling hostNetwork/hostPID trades a small number of low-level host metrics for a working deployment.
  # hostNetwork: false
  # hostPID: false

# ============================================================
# METRICS — Prometheus + Alertmanager
# ============================================================
prometheus:
  enabled: true
  server:
    extraFlags:
      - web.enable-remote-write-receiver
      - web.enable-lifecycle
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistentVolume:
      enabled: true
      size: 5Gi
  # Disable all scrape jobs — Alloy handles collection via remote_write
  # Only prometheus self-scrape remains (job="prometheus")
  scrapeConfigs:
    kubernetes-api-servers:
      enabled: false
    kubernetes-nodes:
      enabled: false
    kubernetes-nodes-cadvisor:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-service-endpoints:
      enabled: false
    kubernetes-service-endpoints-slow:
      enabled: false
    kubernetes-services:
      enabled: false
    kubernetes-pods-slow:
      enabled: false
    prometheus-pushgateway:
      enabled: false
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-pushgateway:
    enabled: false

alertmanager:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    size: 1Gi

# ============================================================
# LOGS — Loki
# ============================================================
loki:
  enabled: true
  lokiCanary:
    extraArgs:
      - -labelname=service_name
      - -labelvalue=loki-canary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
  minio:
    enabled: true
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

# ============================================================
# TRACES — Tempo
# ============================================================
tempo:
  enabled: true
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://k8s-grafana-stack-prometheus-server/api/v1/write"
  tempo:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
    retention: 24h
  persistence:
    enabled: true
    size: 5Gi
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true

# ============================================================
# VISUALIZATION — Grafana
# ============================================================
grafana:
  adminPassword: admin
  initChownData:
    enabled: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://k8s-grafana-stack-prometheus-server
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          uid: loki
          url: http://k8s-grafana-stack-loki:3100
          access: proxy
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://k8s-grafana-stack-tempo:3200
          access: proxy
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: kubernetes
          orgId: 1
          folder: Kubernetes
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
  dashboards:
    kubernetes:
      k8s-views-global:
        gnetId: 15757
        revision: 37
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15758
        revision: 35
        datasource: Prometheus
      k8s-views-nodes:
        gnetId: 15759
        revision: 29
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15760
        revision: 28
        datasource: Prometheus
  # Ingress — uncomment and fill in to expose Grafana via your ingress controller
  # ingress:
  #   enabled: true
  #   ingressClassName: nginx     # or traefik, or any other ingress controller
  #   hosts:
  #     - your-domain
  #   path: /grafana
  # grafana.ini:
  #   server:
  #     root_url: "http://your-domain/grafana"
  #     serve_from_sub_path: true
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
