{{- if .Values.traefik.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.traefik.gatewayName }}
      namespace: {{ .Values.traefik.gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: {{ .Release.Name }}
          port: 80
{{- end }}
