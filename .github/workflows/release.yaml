name: Release Chart

on:
  push:
    branches:
      - main
    paths:
      - 'Chart.yaml'
      - 'Chart.lock'
      - 'values.yaml'
      - 'values-k3s.yaml'
      - 'templates/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Build dependencies
        run: helm dependency update

      - name: Package chart
        run: helm package . -d /tmp/release/

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/release/*.tgz .
          helm repo index . --url https://romain-malfroid.github.io/k8s-grafana-stack
          git add *.tgz index.yaml
          VERSION=$(grep '^version:' $GITHUB_WORKSPACE/Chart.yaml | awk '{print $2}')
          git diff --staged --quiet || git commit -m "Release v${VERSION}"
          git push origin gh-pages
