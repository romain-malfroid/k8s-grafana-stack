name: Release Chart

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Add dependency repos
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm dependency update charts/k8s-grafana-stack

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to GHCR (oras)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          cp README.md charts/k8s-grafana-stack/README.md
          helm package charts/k8s-grafana-stack

      - name: Push chart
        run: helm push k8s-grafana-stack-*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts

      - name: Create GitHub release
        run: |
          VERSION=$(helm show chart charts/k8s-grafana-stack | grep '^version:' | awk '{print $2}')
          gh release create "k8s-grafana-stack-${VERSION}" \
            --title "k8s-grafana-stack ${VERSION}" \
            --generate-notes \
            --latest || echo "Release already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Artifact Hub metadata
        run: |
          oras push ghcr.io/${{ github.repository_owner }}/helm-charts/k8s-grafana-stack:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            charts/k8s-grafana-stack/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
